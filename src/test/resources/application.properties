# URL API (override via -Dapi.base-url or API_BASE_URL)
api.base-url=http://localhost

# Connection timeout in milliseconds
api.connect-timeout-ms=5000

# Read timeout in milliseconds
api.read-timeout-ms=10000

# API key value for X-API-KEY header (override via -Dapi.x-api-key or API_X_API_KEY)
api.x-api-key=DEFAULT